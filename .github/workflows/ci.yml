name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - run: ruff check src/sqldataclass/
      - run: ruff format --check src/sqldataclass/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,postgres]" vendor/blueprint_linters-*.whl
      - run: mypy src/sqldataclass/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - run: pytest tests/ -m "not integration and not performance" --cov=sqldataclass --cov-report=xml -x -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - run: pytest tests/ -m integration -x -v

  performance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - name: runtime
            file: test_runtime_benchmarks.py
          - name: memory
            file: test_memory_benchmarks.py
          - name: comparison
            file: test_comparison_benchmarks.py
    name: performance (${{ matrix.suite.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - name: Performance tests
        run: pytest tests/performance_tests/${{ matrix.suite.file }} -v -s

  diff-cover:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" vendor/blueprint_linters-*.whl
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - run: diff-cover coverage.xml --compare-branch=origin/main --fail-under=80
