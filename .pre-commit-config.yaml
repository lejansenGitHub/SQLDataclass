repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src/sqldataclass/
        language: system
        pass_filenames: false
        types: [python]

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-type-ignore
        name: no-bare-type-ignore
      - id: python-check-blanket-noqa
        name: noqa-needs-code

  - repo: local
    hooks:
      - id: type-ignore-needs-reason
        name: type-ignore-needs-reason
        entry: '# type: ignore\[[\w-]+(,\s*[\w-]+)*\]\s*$'
        language: pygrep
        types: [python]
        description: "type: ignore[code] must have a trailing reason comment"

      - id: noqa-needs-reason
        name: noqa-needs-reason
        entry: '# noqa: [A-Z]+[0-9]+\s*$'
        language: pygrep
        types: [python]
        description: "noqa: CODE must have a trailing reason comment"

      - id: unit-tests
        name: unit-tests
        entry: .venv/bin/pytest tests/ -m "not integration and not performance" -x -q
        language: system
        pass_filenames: false
        types: [python]

      - id: diff-cover
        name: diff-cover
        entry: bash -c '.venv/bin/pytest tests/ -m "not integration and not performance" --cov=sqldataclass --cov-report=xml -q && .venv/bin/diff-cover coverage.xml --compare-branch=origin/main --fail-under=80'
        language: system
        pass_filenames: false
        stages: [pre-push]
