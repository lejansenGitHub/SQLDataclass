repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src/sqldataclass/
        language: system
        pass_filenames: false
        types: [python]

      # --- pygrep rules ---

      - id: no-bare-type-ignore
        name: "type: ignore must have [code]"
        language: pygrep
        entry: '#\s*type:\s*ignore(?!\[)'
        types: [python]

      - id: type-ignore-needs-reason
        name: "type: ignore[code] needs reason comment"
        language: pygrep
        entry: '#\s*type:\s*ignore\[[^\]]+\]\s*$'
        types: [python]

      - id: noqa-needs-code
        name: "noqa must have error code"
        language: pygrep
        entry: '#\s*noqa\s*$'
        types: [python]

      - id: noqa-needs-reason
        name: "noqa needs reason comment"
        language: pygrep
        entry: '#\s*noqa:\s*[A-Z]\w+\s*$'
        types: [python]

      # --- blueprint linters (vendored wheel) ---

      - id: blueprint-linters
        name: "blueprint linters (lib)"
        entry: .venv/bin/python -m blueprint_linters --preset lib
        language: system
        types: [python]

      # --- unit tests on commit ---

      - id: unit-tests
        name: unit tests
        entry: .venv/bin/pytest tests/ -m "not integration and not performance" -x -q
        language: system
        pass_filenames: false
        types: [python]
        always_run: true

      # --- coverage (pre-push only) ---

      - id: diff-cover
        name: "diff-cover: new/changed lines must be covered"
        entry: bash -c '.venv/bin/pytest tests/ -m "not integration and not performance" --cov=sqldataclass --cov-report=xml -q && .venv/bin/diff-cover coverage.xml --compare-branch=origin/main --fail-under=80'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
